<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>You're offline · Print</title>
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #0b0b0f;
        color: #f5f5f7;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        -webkit-font-smoothing: antialiased;
      }
      .wrap {
        min-height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }
      .card {
        max-width: 380px;
        width: 100%;
        text-align: center;
      }
      .dot {
        width: 12px;
        height: 12px;
        border-radius: 999px;
        background: #ef4444;
        display: inline-block;
        margin-bottom: 20px;
        box-shadow: 0 0 0 6px rgba(239, 68, 68, 0.15);
      }
      h1 {
        font-size: 22px;
        font-weight: 600;
        margin: 0 0 8px;
        letter-spacing: -0.01em;
      }
      p {
        margin: 0 0 24px;
        color: #a1a1aa;
        font-size: 14px;
        line-height: 1.5;
      }
      button {
        appearance: none;
        border: 0;
        cursor: pointer;
        background: #f5f5f7;
        color: #0b0b0f;
        font-size: 14px;
        font-weight: 600;
        padding: 10px 20px;
        border-radius: 8px;
        transition: opacity 0.15s ease;
      }
      button:hover { opacity: 0.9; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <span class="dot" aria-hidden="true"></span>
        <h1>You're offline</h1>
        <p>Print needs an internet connection to reach your printer. Check your connection and try again.</p>
        <button type="button" onclick="location.reload()">Retry</button>
      </div>
    </div>
  </body>
</html>
